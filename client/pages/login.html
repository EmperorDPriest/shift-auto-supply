<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Shift Auto Supply</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <meta name="theme-color" content="#0066CC">
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-base); padding: var(--space-5); }
    .auth-container { width: 100%; max-width: 440px; }
    .auth-logo { text-align: center; margin-bottom: var(--space-8); }
    .auth-logo .brand { font-family: var(--font-head); font-size: 24px; font-weight: 800; color: var(--text-primary); display: block; }
    .auth-logo .tagline { font-size: 12px; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; margin-top: 2px; display: block; }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: var(--space-8); box-shadow: var(--shadow-lg); }
    .auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin: 0 calc(-1 * var(--space-8)) var(--space-6); padding: 0 var(--space-8); }
    .auth-tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid transparent; cursor: pointer; margin-bottom: -1px; transition: all var(--transition-fast); }
    .auth-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .auth-form { display: none; }
    .auth-form.active { display: flex; flex-direction: column; gap: var(--space-4); }
    .auth-divider { display: flex; align-items: center; gap: var(--space-4); margin: var(--space-2) 0; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .auth-divider span { font-size: 12px; color: var(--text-muted); font-weight: 500; white-space: nowrap; }
    .auth-footer { text-align: center; margin-top: var(--space-6); font-size: 13px; color: var(--text-muted); }
    .auth-footer a { color: var(--blue); font-weight: 600; }
    .input-wrapper { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
    .input-wrapper input { padding-left: 42px; }
    .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; padding: 4px; }
    .password-toggle:hover { color: var(--text-primary); }
    .trust-row { display: flex; align-items: center; justify-content: center; gap: var(--space-5); margin-top: var(--space-6); }
    .trust-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
    .trust-item svg { color: var(--blue); }
    @media(prefers-color-scheme: dark) { body { background: #0F1117; } }
  </style>
  <script>window.ENV = { API_URL: 'http://localhost:5000/api/v1' };</script>
</head>
<body>

<div class="auth-container">
  <div class="auth-logo">
    <a href="/" style="text-decoration:none">
      <div style="display:inline-flex;align-items:center;gap:12px">
        <div class="site-logo-mark" style="width:40px;height:40px">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <div>
          <span class="brand">Shift Auto Supply</span>
          <span class="tagline">Premium Auto Parts</span>
        </div>
      </div>
    </a>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" id="loginTab" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" id="registerTab" onclick="switchTab('register')">Create Account</div>
    </div>

    <!-- Login Form -->
    <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="loginEmail" class="form-input" placeholder="your@email.com" required autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <label class="form-label">Password</label>
          <a href="#" style="font-size:12px;color:var(--blue);font-weight:600">Forgot password?</a>
        </div>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="loginPassword" class="form-input" placeholder="Your password" required autocomplete="current-password">
          <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div id="loginError" class="alert alert-error" style="display:none"></div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
        Sign In to My Account
      </button>
      <div class="auth-divider"><span>or continue as guest</span></div>
      <a href="/pages/shop.html" class="btn btn-secondary btn-full">Browse Without Account</a>
    </form>

    <!-- Register Form -->
    <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="regName" class="form-input" placeholder="John Smith" required autocomplete="name">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="regEmail" class="form-input" placeholder="your@email.com" required autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Phone (optional)</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 14 19.79 19.79 0 0 1 1.61 5.38 2 2 0 0 1 3.6 3h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l.82-.82a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 17v-.08z"/></svg>
          <input type="tel" id="regPhone" class="form-input" placeholder="+1 (555) 000-0000" autocomplete="tel">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="regPassword" class="form-input" placeholder="Min 8 characters" required autocomplete="new-password" oninput="updatePasswordStrength(this.value)">
          <button type="button" class="password-toggle" onclick="togglePassword('regPassword', this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div id="passwordStrengthBar" style="height:3px;border-radius:2px;background:var(--border);margin-top:8px;overflow:hidden"><div id="passwordStrengthFill" style="height:100%;width:0;transition:width .3s,background .3s;border-radius:2px"></div></div>
        <div id="passwordStrengthLabel" class="form-hint" style="margin-top:4px"></div>
      </div>
      <div id="registerError" class="alert alert-error" style="display:none"></div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn">Create My Account</button>
      <p style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:var(--space-2)">
        By creating an account, you agree to our <a href="/pages/privacy-policy.html" style="color:var(--blue)">Privacy Policy</a>
      </p>
    </form>
  </div>

  <div class="trust-row">
    <div class="trust-item">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Secure
    </div>
    <div class="trust-item">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Encrypted
    </div>
    <div class="trust-item">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Trusted
    </div>
  </div>

  <p class="auth-footer"><a href="/">← Back to Shift Auto Supply</a></p>
</div>

<script src="/js/core/api.js"></script>
<script src="/js/core/auth.js"></script>
<script src="/js/core/cart.js"></script>
<script>
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  document.getElementById(`${tab}Tab`).classList.add('active');
  document.getElementById(`${tab}Form`).classList.add('active');
  document.title = tab === 'login' ? 'Sign In — Shift Auto Supply' : 'Create Account — Shift Auto Supply';
}

function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  btn.innerHTML = isText
    ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
    : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
}

function updatePasswordStrength(val) {
  const bar   = document.getElementById('passwordStrengthFill');
  const label = document.getElementById('passwordStrengthLabel');
  if (!bar || !label) return;
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    { w: '20%', bg: 'var(--crimson)',   t: 'Too weak' },
    { w: '40%', bg: '#F59E0B',          t: 'Weak' },
    { w: '70%', bg: '#3B82F6',          t: 'Good' },
    { w: '100%', bg: '#22C55E',         t: 'Strong' },
  ];
  const lvl = levels[Math.max(0, score - 1)] || levels[0];
  bar.style.width = val.length ? lvl.w : '0';
  bar.style.background = lvl.bg;
  label.textContent = val.length ? lvl.t : '';
  label.style.color = lvl.bg;
}

async function handleLogin(e) {
  e.preventDefault();
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn      = document.getElementById('loginBtn');
  const errEl    = document.getElementById('loginError');

  btn.disabled = true; btn.textContent = 'Signing in…';
  errEl.style.display = 'none';

  try {
    const user = await SAS.auth.login(email, password);
    const redirect = sessionStorage.getItem('sas_redirect_after_login');
    sessionStorage.removeItem('sas_redirect_after_login');

    if (user.role === 'admin') {
      window.location.href = redirect || '/pages/admin/index.html';
    } else {
      window.location.href = redirect || '/pages/dashboard.html';
    }
  } catch (err) {
    errEl.textContent = err.message || 'Invalid email or password';
    errEl.style.display = 'flex';
    btn.disabled = false; btn.textContent = 'Sign In to My Account';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const name     = document.getElementById('regName').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const phone    = document.getElementById('regPhone').value.trim();
  const btn      = document.getElementById('registerBtn');
  const errEl    = document.getElementById('registerError');

  if (password.length < 8) { errEl.textContent = 'Password must be at least 8 characters'; errEl.style.display = 'flex'; return; }

  btn.disabled = true; btn.textContent = 'Creating account…';
  errEl.style.display = 'none';

  try {
    await SAS.auth.register(name, email, password, phone);
    const redirect = sessionStorage.getItem('sas_redirect_after_login');
    sessionStorage.removeItem('sas_redirect_after_login');
    window.location.href = redirect || '/pages/dashboard.html';
  } catch (err) {
    errEl.textContent = err.message || 'Registration failed. Please try again.';
    errEl.style.display = 'flex';
    btn.disabled = false; btn.textContent = 'Create My Account';
  }
}

// Check URL param for tab
document.addEventListener('DOMContentLoaded', () => {
  const tab = new URLSearchParams(window.location.search).get('tab');
  if (tab === 'register') switchTab('register');

  // Redirect if already logged in
  if (SAS.auth?.isLoggedIn) {
    window.location.href = SAS.auth.isAdmin ? '/pages/admin/index.html' : '/pages/dashboard.html';
  }
});
</script>
</body>
</html>
