<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Auto Parts — Shift Auto Supply</title>
  <meta name="description" content="Browse our full catalog of BMW and auto parts. Filter by brand, model, year, price, and condition.">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <meta name="theme-color" content="#0066CC">
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/shop.css">
  <script>window.ENV = { API_URL: `https://shift-auto-api.onrender.com/api/v1` };</script>
</head>
<body>
<div class="announcement-bar">
  <strong>Global Shipping Available</strong> — Genuine BMW &amp; performance parts shipped worldwide.
  <button class="announcement-close" onclick="this.closest('.announcement-bar').style.display='none'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>
<header class="header">
  <div class="header-inner">
    <button class="mobile-nav-btn" onclick="SAS.openDrawer('mobileMenuDrawer')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a href="/" class="site-logo">
      <div class="site-logo-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div class="site-logo-name"><span class="brand">Shift Auto</span><span class="tagline">Supply Co.</span></div>
    </a>
    <div class="header-search">
      <input type="search" id="headerSearchInput" placeholder="Search parts, SKU, model..." autocomplete="off">
      <button class="header-search-btn" onclick="applySearchFromHeader()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" aria-label="Toggle dark mode"></button>
      <a href="/pages/dashboard.html" class="header-btn" data-auth-show style="display:none">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
      <a href="/pages/login.html" class="header-btn" data-guest-show>
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
      <button class="header-btn" onclick="SAS.openDrawer('cartDrawer')">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" data-cart-count>0</span>
      </button>
    </div>
  </div>
</header>

<!-- Shop Header Bar -->
<div class="shop-header-bar">
  <div class="container">
    <nav class="breadcrumb">
      <a href="/">Home</a>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span>Shop</span>
    </nav>
    <div class="shop-header-info">
      <div>
        <h1 id="shopTitle">All Parts</h1>
        <p id="shopSubtitle" class="text-secondary" style="font-size:14px;margin-top:4px"></p>
      </div>
      <div class="shop-header-controls">
        <span id="totalResultsLabel" class="text-secondary text-sm"></span>
        <select id="sortSelect" class="form-input" style="width:auto;padding:8px 32px 8px 12px;height:36px;font-size:13px" onchange="loadProducts(1)">
          <option value="-createdAt">Newest First</option>
          <option value="price">Price: Low to High</option>
          <option value="-price">Price: High to Low</option>
          <option value="-viewCount">Most Popular</option>
          <option value="-averageRating">Top Rated</option>
        </select>
        <div class="view-toggle">
          <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" id="listViewBtn" onclick="setView('list')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
        <button class="btn btn-secondary btn-sm show-sm" onclick="SAS.openDrawer('filterDrawer')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          Filters <span id="activeFilterCount" class="badge badge-blue" style="display:none">0</span>
        </button>
      </div>
    </div>
    <div id="activeFilters" class="active-filters" style="display:none"></div>
  </div>
</div>

<!-- Main Layout -->
<div class="container shop-layout">
  <aside class="filter-sidebar hide-sm hide-md" id="desktopFilters">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-5)">
      <h3 style="font-size:15px;font-weight:700">Filters</h3>
      <button onclick="clearAllFilters()" class="filter-clear">Clear All</button>
    </div>
    <div id="filterSidebarContent"></div>
  </aside>
  <main class="shop-main">
    <div class="product-grid" id="productsGrid"></div>
    <div id="emptyState" class="empty-state" style="display:none">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <h3>No parts found</h3>
      <p>Try adjusting your filters or search terms</p>
      <button onclick="clearAllFilters()" class="btn btn-primary btn-sm" style="margin-top:16px">Clear Filters</button>
    </div>
    <div id="paginationContainer" class="pagination"></div>
  </main>
</div>

<!-- Drawers -->
<div class="drawer-overlay"></div>
<div class="drawer left" id="filterDrawer" style="width:min(320px,90vw)">
  <div class="drawer-header">
    <h3>Filters</h3>
    <button class="drawer-close" onclick="SAS.closeDrawer('filterDrawer')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body" style="padding:var(--space-5)">
    <div id="filterDrawerContent"></div>
  </div>
  <div class="drawer-footer">
    <button class="btn btn-primary btn-full" onclick="SAS.closeDrawer('filterDrawer')">Apply Filters</button>
    <button class="btn btn-ghost btn-full btn-sm" style="margin-top:8px" onclick="clearAllFilters()">Clear All</button>
  </div>
</div>
<div class="drawer" id="cartDrawer">
  <div class="drawer-header">
    <h3>Cart <span style="color:var(--text-muted);font-weight:400;font-size:14px" data-cart-items-count></span></h3>
    <button class="drawer-close" onclick="SAS.closeDrawer('cartDrawer')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="cartDrawerItems"></div>
  <div class="drawer-footer">
    <div id="cartDrawerSummary" style="margin-bottom:var(--space-4)"></div>
    <a href="/pages/checkout.html" class="btn btn-primary btn-full btn-lg">Proceed to Checkout</a>
  </div>
</div>
<div class="drawer left" id="mobileMenuDrawer" style="width:min(300px,92vw)">
  <div class="drawer-header"><h3>Menu</h3>
    <button class="drawer-close" onclick="SAS.closeDrawer('mobileMenuDrawer')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body" style="padding:0">
    <a href="/" class="mobile-menu-link">Home</a>
    <a href="/pages/shop.html" class="mobile-menu-link">Shop</a>
    <a href="/pages/bmw-finder.html" class="mobile-menu-link">BMW Finder</a>

    <a href="/pages/contact.html" class="mobile-menu-link">Contact</a>
    <a href="/pages/dashboard.html" class="mobile-menu-link" data-auth-show style="display:none">My Account</a>
  </div>
  <div class="drawer-footer">
    <a href="/pages/login.html" class="btn btn-primary btn-full" data-guest-show>Sign In</a>
    <button onclick="SAS.auth.logout()" class="btn btn-secondary btn-full" data-auth-show style="display:none">Sign Out</button>
  </div>
</div>

<a href="/pages/contact.html" class="float-support">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</a>
<div class="sticky-cart-bar" style="display:none">
  <button class="btn btn-secondary" onclick="SAS.openDrawer('cartDrawer')">Cart (<span data-cart-count>0</span>)</button>
  <a href="/pages/checkout.html" class="btn btn-primary flex-1">Checkout — <span data-cart-total>$0.00</span></a>
</div>

<script src="/js/core/api.js"></script>
<script src="/js/core/auth.js"></script>
<script src="/js/core/cart.js"></script>
<script src="/js/pages/shop.js"></script>
</body>
</html>
