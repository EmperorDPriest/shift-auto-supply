<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — Admin — Shift Auto Supply</title>
  <meta name="robots" content="noindex,nofollow">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <meta name="theme-color" content="#0066CC">
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/admin.css">
  <script>window.ENV = { API_URL: `https://shift-auto-api.onrender.com/api/v1` };</script>
</head>
<body class="admin-body">
<aside class="admin-sidebar" id="adminSidebar">
  <div class="admin-sidebar-header">
    <a href="/" class="site-logo"><div class="site-logo-mark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><div class="site-logo-name"><span class="brand" style="font-size:15px">Shift Auto</span><span class="tagline">Admin Panel</span></div></a>
  </div>
  <nav class="admin-nav">
    <div class="admin-nav-section">Overview</div>
    <a href="/pages/admin/index.html" class="admin-nav-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
    <div class="admin-nav-section" style="margin-top:var(--space-4)">Catalog</div>
    <a href="/pages/admin/products.html" class="admin-nav-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Products</a>
    <div class="admin-nav-section" style="margin-top:var(--space-4)">Orders</div>
    <a href="/pages/admin/orders.html" class="admin-nav-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>All Orders</a>
    <div class="admin-nav-section" style="margin-top:var(--space-4)">Settings</div>
    <a href="/pages/admin/payments.html" class="admin-nav-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Payment Methods</a>
    <a href="/pages/admin/users.html" class="admin-nav-link active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Users</a>
  </nav>
  <div class="admin-sidebar-footer">
    <div class="admin-user-card"><div class="admin-user-avatar">A</div><div><div style="font-size:13px;font-weight:700" data-user-name>Admin</div><div style="font-size:11px;color:var(--text-muted)" data-user-email></div></div></div>
    <button onclick="SAS.auth.logout()" class="btn btn-ghost btn-sm" style="width:100%;margin-top:var(--space-3)">Sign Out</button>
  </div>
</aside>
<button class="admin-sidebar-toggle" onclick="document.getElementById('adminSidebar').classList.toggle('mobile-open')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>

<main class="admin-main">
  <div class="admin-topbar">
    <div><h1 class="admin-page-title">Users</h1><p class="admin-page-subtitle">Manage customer accounts and access</p></div>
    <button class="theme-toggle" aria-label="Toggle dark mode"></button>
  </div>

  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-4) var(--space-5);margin-bottom:var(--space-5);display:flex;gap:var(--space-3);flex-wrap:wrap;align-items:center">
    <input type="search" id="userSearch" class="form-input" placeholder="Search by name or email..." style="width:280px;height:36px" oninput="debounceSearch()">
    <select id="roleFilter" class="form-input" style="width:140px;height:36px" onchange="loadUsers(1)">
      <option value="">All Roles</option>
      <option value="customer">Customers</option>
      <option value="admin">Admins</option>
    </select>
    <span id="usersCount" class="text-sm text-secondary" style="margin-left:auto"></span>
  </div>

  <div class="table-wrapper">
    <table class="data-table">
      <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Last Login</th><th>Actions</th></tr></thead>
      <tbody id="usersTableBody"><tr><td colspan="7" style="text-align:center;padding:60px;color:var(--text-muted)">Loading users…</td></tr></tbody>
    </table>
  </div>
  <div id="usersPagination" class="pagination" style="margin-top:var(--space-6)"></div>
</main>

<script src="/js/core/api.js"></script>
<script src="/js/core/auth.js"></script>
<script src="/js/core/cart.js"></script>
<script>
let searchTimer = null;
function debounceSearch(){ clearTimeout(searchTimer); searchTimer=setTimeout(()=>loadUsers(1),400); }

async function loadUsers(page=1){
  const tbody=document.getElementById('usersTableBody');
  tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)"><div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px"></div>Loading…</td></tr>`;
  const q=document.getElementById('userSearch')?.value?.trim();
  const role=document.getElementById('roleFilter')?.value;
  try{
    const res=await SAS.adminAPI.getUsers({page,limit:20,...(q&&{q}),...(role&&{role})});
    const{users,pagination}=res.data;
    document.getElementById('usersCount').textContent=`${pagination.total} users`;
    if(!users.length){tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:60px;color:var(--text-muted)">No users found</td></tr>`;return;}
    tbody.innerHTML=users.map(u=>`<tr>
      <td><div style="display:flex;align-items:center;gap:var(--space-3)">
        <div style="width:36px;height:36px;background:var(--blue-50);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--blue);font-size:14px;flex-shrink:0">${(u.name||'?')[0].toUpperCase()}</div>
        <div><div style="font-weight:600;font-size:13px">${u.name||'—'}</div>${u.phone?`<div style="font-size:11px;color:var(--text-muted)">${u.phone}</div>`:''}</div>
      </div></td>
      <td style="font-size:13px">${u.email}</td>
      <td><span class="badge ${u.role==='admin'?'badge-crimson':'badge-gray'}" style="text-transform:capitalize">${u.role}</span></td>
      <td><span class="badge ${u.isActive?'badge-green':'badge-gray'}">${u.isActive?'Active':'Inactive'}</span></td>
      <td style="font-size:12px;color:var(--text-muted)">${SAS.utils.formatDate(u.createdAt)}</td>
      <td style="font-size:12px;color:var(--text-muted)">${u.lastLoginAt?SAS.utils.formatDate(u.lastLoginAt):'Never'}</td>
      <td><div style="display:flex;gap:6px">
        ${u.role!=='admin'?`<button class="btn btn-secondary btn-sm" onclick="toggleUser('${u._id}','${u.name}',${!u.isActive})">${u.isActive?'Deactivate':'Activate'}</button>`:''}
      </div></td>
    </tr>`).join('');
    renderPagination(pagination,page);
  }catch(err){tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">Error: ${err.message}</td></tr>`;}
}

function renderPagination({pages},page){
  const el=document.getElementById('usersPagination');
  if(!el||pages<=1){if(el)el.innerHTML='';return;}
  let h=`<button class="page-btn" onclick="loadUsers(${page-1})" ${page===1?'disabled':''}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>`;
  for(let i=Math.max(1,page-2);i<=Math.min(pages,page+2);i++)h+=`<button class="page-btn ${i===page?'active':''}" onclick="loadUsers(${i})">${i}</button>`;
  h+=`<button class="page-btn" onclick="loadUsers(${page+1})" ${page===pages?'disabled':''}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>`;
  el.innerHTML=h;
}

async function toggleUser(id,name,isActive){
  if(!confirm(`${isActive?'Activate':'Deactivate'} user "${name}"?`))return;
  try{
    await SAS.adminAPI.updateUser(id,{isActive});
    SAS.toast.success(`User ${isActive?'activated':'deactivated'}`);
    loadUsers(1);
  }catch(err){SAS.toast.error(err.message||'Failed to update user');}
}

document.addEventListener('DOMContentLoaded',async()=>{
  await new Promise(r=>setTimeout(r,300));
  if(!SAS.auth.isAdmin){window.location.href='/pages/login.html';return;}
  loadUsers(1);
});
</script>
</body>
</html>
